services:
  expo-app:
    build: .
    container_name: ewalletbunker_app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.100.241
    stdin_open: true
    tty: true
volumes:
  node_modules: