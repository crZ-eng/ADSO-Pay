services:
  expo-app:
    build: .
    container_name: ewalletbunker_app
    ports:
      - "8081:8081"
      - "19000:19000"
      - "19001:19001"
      - "19002:19002"
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - NGROK_AUTHTOKEN=3E2sCD6zUCcmwV9rkB5LOMNXfYf_7M9QgpqqdAFDE4XJ8PC7R
      - REACT_NATIVE_PACKAGER_HOSTNAME=192.168.137.136
    stdin_open: true
    tty: true
volumes:
  node_modules: